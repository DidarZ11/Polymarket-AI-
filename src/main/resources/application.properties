# ===== Настройки приложения =====
spring.application.name=polymarket-ai-agent

# ===== Настройки базы данных PostgreSQL =====
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== Настройки JPA / Hibernate =====
# update — автоматически обновляет схему таблиц при запуске
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Hibernate batch =====
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== Настройки пула соединений HikariCP =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ===== Настройки Jackson (JSON) =====
# Не падать на неизвестных полях от внешнего API
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== Claude API =====
anthropic.api.key=${ANTHROPIC_API_KEY}

# ===== News API =====
# Ключ берётся из переменной окружения NEWS_API_KEY (IntelliJ: Run → Edit Configurations → Environment variables)
newsapi.key=${NEWS_API_KEY}

# ===== Логирование =====
logging.level.org.example.pet1=DEBUG
logging.level.org.hibernate.SQL=DEBUG
